<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <title>AI Studio</title>
    <style>
        html.studio-route-booting body {
            visibility: hidden !important;
        }
    </style>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
                document.documentElement.classList.add('studio-route-booting');
            } catch(e) {}
        })();
    </script>
    <script>
        (function(){
            var NativeMutationObserver = window.MutationObserver;
            if(!NativeMutationObserver || NativeMutationObserver.__studioObserveGuarded) return;
            var nativeObserve = NativeMutationObserver.prototype.observe;
            NativeMutationObserver.prototype.observe = function(target, options){
                if(!target || typeof target.nodeType !== 'number') return;
                return nativeObserve.call(this, target, options);
            };
            NativeMutationObserver.__studioObserveGuarded = true;
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.06.11.1"></script>
    <script src="/static/js/theme.js?v=2026.06.11.1"></script>
    <script src="/static/js/i18n.js?v=2026.06.11.1"></script>
    <style>
        @import url('/static/vendor/css/fonts.css?v=2026.06.11.1');

        /* 本地 Tailwind 工具类兜底：CDN 慢/未就绪时也能立刻给图标尺寸，避免首屏左侧栏空白 */
        .w-1\.5 { width: 0.375rem; }
        .h-1\.5 { height: 0.375rem; }
        .w-4 { width: 1rem; }
        .h-4 { height: 1rem; }
        .w-5 { width: 1.25rem; }
        .h-5 { height: 1.25rem; }
        .flex-shrink-0 { flex-shrink: 0; }
        .rounded-full { border-radius: 9999px; }
        .mb-12 { margin-bottom: 3rem; }
        .transition-colors { transition-property: color, background-color, border-color, fill, stroke; transition-duration: 150ms; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pulse { animation: studio-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes studio-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        :root {
            --accent: #000000;
            --fluid-ease: cubic-bezier(0.3, 0, 0, 1);
            --bg: #ffffff;
            --sidebar-bg: #ffffff;
            --stage-bg: #fcfcfc;
            --border: #f2f2f2;
            --stage-border: #f0f0f0;
            --text: #121212;
            --muted: #999;
            --nav-hover-bg: #fafafa;
            --monitor-bg: rgba(255, 255, 255, 0.7);
            --monitor-border: rgba(0, 0, 0, 0.05);
            --monitor-shadow: rgba(0, 0, 0, 0.04);
            --divider: rgba(0, 0, 0, 0.1);
            --scrollbar: #d8d8d8;
            --scrollbar-hover: #c0c0c0;
        }

        html.theme-dark,
        body.theme-dark {
            --bg: #0f141d;
            --sidebar-bg: #0f141d;
            --stage-bg: #111722;
            --border: #242d3b;
            --stage-border: #2a3444;
            --text: #e5e9f0;
            --muted: #8f9aab;
            --nav-hover-bg: #171d29;
            --monitor-bg: rgba(23, 29, 41, 0.82);
            --monitor-border: rgba(255, 255, 255, 0.08);
            --monitor-shadow: rgba(0, 0, 0, 0.3);
            --divider: rgba(255, 255, 255, 0.15);
            --scrollbar: #334155;
            --scrollbar-hover: #475569;
        }

        /* 极简滚动条 */
        html,
        body {
            overscroll-behavior: auto;
            height: 100%;
            overflow: hidden;
        }

        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }

        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }

        *::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar) !important;
            border: 3px solid transparent !important;
            border-right-width: 3px !important;
            background-clip: padding-box !important;
            border-radius: 10px !important;
            min-height: 36px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--scrollbar-hover) !important;
        }

        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }

        * {
            scrollbar-width: thin !important;
            scrollbar-color: var(--scrollbar) transparent !important;
        }

        body {
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            background: var(--bg);
            position: relative;
            transition: background 0.3s;
        }

        /* 侧边栏 */
        .sidebar {
            width: 80px;
            min-width: 80px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border);
            padding: 40px 0;
            transition: width 0.5s var(--fluid-ease), background 0.3s, border-color 0.3s;
            z-index: 50;
            overflow: hidden;
        }



        /* 首次加载时与 iframe 的 0.5s 淡入同步播放，避免侧栏"焊死"在原地造成视觉断层 */
        @keyframes sidebar-enter {
            from { opacity: 0; transform: translateX(-6px); }
            to { opacity: 1; transform: translateX(0); }
        }
        html:not(.studio-route-booting) .sidebar {
            animation: sidebar-enter 0.5s var(--fluid-ease);
        }

        .logo-ring {
            width: 36px;
            height: 36px;
            border: 2px solid var(--text);
            border-radius: 12px;
            background: transparent;
            padding: 0;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            /* 仅保留 hover 真正会用到的属性过渡，避免 transition: all 因首屏属性补齐被意外触发 */
            transition: transform 0.6s var(--fluid-ease), border-radius 0.6s var(--fluid-ease), border-color 0.3s, background-color .18s, box-shadow .2s;
        }

        .logo-ring:hover,
        .logo-ring:focus-visible {
            background: var(--nav-hover-bg);
            border-color: var(--text);
            box-shadow: 0 0 0 4px rgba(148, 163, 184, .16), 0 10px 24px rgba(15, 23, 42, .08);
            outline: none;
        }

        .logo-ring:hover #logo-dot,
        .logo-ring:focus-visible #logo-dot {
            transform: scale(1.8);
        }

        .logo-ring:active {
            transform: scale(.94);
            transition-delay: 0s;
        }

        .sidebar:hover .logo-ring:active {
            transform: rotate(90deg) scale(.94);
        }

        #logo-dot {
            transition: transform .16s ease, background-color .16s ease, box-shadow .16s ease;
        }

        /* 导航项 */
        .nav-item {
            position: relative;
            width: 48px;
            height: 48px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-radius: 18px;
            cursor: pointer;
            /* 只对 width 做过渡（侧栏固定展开效果）；background/color 不参与过渡，避免 active 切换时底色"流动" */
            transition: width 0.3s var(--fluid-ease);
            color: var(--muted);
            overflow: hidden;
            padding-left: 14px;
        }

        .nav-item:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent);
            color: #fff;
        }

        html.theme-dark .nav-item.active,
        body.theme-dark .nav-item.active {
            background: #f1f5f9;
            color: #0f172a;
        }

        .nav-text {
            opacity: 0;
            margin-left: 16px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: opacity 0.3s;
        }

        .nav-fold-toggle {
            position: relative;
            width: 48px;
            height: 36px;
            margin: 0 0 6px;
            padding-left: 14px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: transparent;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            overflow: hidden;
            transition: width 0.3s var(--fluid-ease), background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        .nav-fold-toggle:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
            border-color: var(--stage-border);
        }

        .nav-fold-icon {
            width: 18px;
            height: 18px;
            flex: 0 0 auto;
            transition: transform 0.25s var(--fluid-ease);
        }

        .nav-fold-toggle[aria-expanded="false"] .nav-fold-icon {
            transform: rotate(-90deg);
        }

        .nav-fold-group {
            width: 100%;
            max-height: 282px;
            opacity: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: max-height 0.3s var(--fluid-ease), opacity 0.2s ease;
        }

        .nav-fold-group.is-collapsed {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar nav {
            width: 100%;
            min-height: 0;
            flex: 1 1 auto;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 6px;
            scrollbar-width: thin;
            scrollbar-color: rgba(148, 163, 184, .34) transparent;
        }

        .sidebar nav::-webkit-scrollbar { width: 4px; }
        .sidebar nav::-webkit-scrollbar-track { background: transparent; }
        .sidebar nav::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, .34);
            border-radius: 999px;
        }

        /* 主舞台区 */
        .stage {
            flex: 1;
            background: var(--stage-bg);
            margin: 16px;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--stage-border);
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.02);
            filter: blur(4px);
            transition: all 0.5s var(--fluid-ease);
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        /* 左下角监视器 */
        .nano-monitor {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--monitor-bg);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid var(--monitor-border);
            box-shadow: 0 4px 20px var(--monitor-shadow);
            font-family: monospace;
            transition: all 0.4s var(--fluid-ease);
        }

        .nano-monitor.is-busy {
            background: #000;
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
        }

        .nano-monitor.is-busy .stat-group {
            color: #fff;
        }

        .divider {
            width: 1px;
            height: 12px;
            background: var(--divider);
        }

        .is-busy .divider {
            background: rgba(255, 255, 255, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }

        .spinner-nano {
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .is-busy .spinner-nano { display: block; }
        .is-busy .pulse-dot { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .label-nano {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            font-size: 9px;
        }

        .side-actions {
            margin-top:12px;
            margin-bottom:12px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            width:100%;
            flex:0 0 auto;
        }

        .side-pill {
            width:44px;
            height:36px;
            border-radius:999px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            /* 只过渡 hover/激活会改的属性，避免 all 触发延迟 */
            transition: width 0.3s var(--fluid-ease), gap 0.3s var(--fluid-ease), background-color 0.2s, color 0.2s, border-color 0.2s;
            flex-shrink: 0;
            overflow:hidden;
            gap:0px;
            position:relative;
        }

        .side-pill:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
            border-color: var(--stage-border);
        }

        .side-pill.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .side-pill.update-available {
            border-color:#22c55e;
            color:#16a34a;
            overflow:visible;
        }

        html.theme-dark .side-pill.update-available,
        body.theme-dark .side-pill.update-available {
            border-color:#86efac;
            color:#86efac;
        }

        .side-pill.update-available::after {
            content:"NEW";
            position:absolute;
            top:-7px;
            right:-9px;
            min-width:28px;
            height:16px;
            padding:0 5px;
            border-radius:999px;
            background:#22c55e;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-size:9px;
            font-weight:900;
            letter-spacing:.02em;
            box-shadow:0 6px 16px rgba(34,197,94,.28), 0 0 0 3px rgba(34,197,94,.12);
            pointer-events:none;
        }

        html.theme-dark .side-pill.update-available::after,
        body.theme-dark .side-pill.update-available::after {
            background:#4ade80;
            color:#052e16;
            box-shadow:0 6px 16px rgba(74,222,128,.22), 0 0 0 3px rgba(74,222,128,.12);
        }

        .side-pill svg { width: 16px; height: 16px; flex:0 0 auto; }
        .side-pill-text {
            opacity:0;
            max-width:0;
            font-size:12px;
            font-weight:800;
            letter-spacing:.02em;
            white-space:nowrap;
            overflow:hidden;
            transition: opacity 0.3s, max-width 0.3s var(--fluid-ease);
        }

        .project-version-badge {
            width:44px;
            min-height:18px;
            padding:0 4px;
            border-radius:999px;
            border:1px solid var(--border);
            background:var(--nav-hover-bg);
            color:var(--muted);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:9px;
            font-weight:800;
            line-height:1;
            white-space:nowrap;
            overflow:hidden;
            transition:width 0.3s var(--fluid-ease), color .2s, border-color .2s, background-color .2s;
        }

        .project-version-compact { display:inline; }
        .project-version-full { display:none; }

        .update-now-btn {
            display:none;
            width:56px;
            min-height:24px;
            padding:0 7px;
            border-radius:999px;
            border:1px solid rgba(34,197,94,.35);
            background:rgba(34,197,94,.1);
            color:#16a34a;
            align-items:center;
            justify-content:center;
            gap:0px;
            font-size:9px;
            font-weight:900;
            overflow:hidden;
            transition:width 0.3s var(--fluid-ease), background-color .2s, color .2s, border-color .2s;
        }
        .update-now-btn.show { display:flex; }
        .update-now-btn:hover { background:#16a34a; color:#fff; border-color:#16a34a; }
        .update-now-btn[disabled] { opacity:.7; cursor:wait; }
        .update-now-btn svg { display:none; width:14px; height:14px; flex:0 0 auto; }
        .update-now-text {
            opacity:1;
            max-width:42px;
            white-space:nowrap;
            overflow:hidden;
            transition: opacity 0.3s, max-width 0.3s var(--fluid-ease);
        }
        .update-action-prefix { display:none; }
        .update-version-compact { display:inline; }
        .update-version-full { display:none; }
        .update-now-btn.show + .project-version-badge { display:none; }
        html.theme-dark .update-now-btn,
        body.theme-dark .update-now-btn {
            border-color:rgba(134,239,172,.42);
            background:rgba(74,222,128,.12);
            color:#86efac;
        }
        html.theme-dark .update-now-btn:hover,
        body.theme-dark .update-now-btn:hover {
            background:#86efac;
            border-color:#86efac;
            color:#052e16;
        }

        .side-pill.desktop-ready {
            color:#2563eb;
            border-color:rgba(37,99,235,.26);
            background:rgba(37,99,235,.06);
        }

        html.theme-dark .side-pill.desktop-ready,
        body.theme-dark .side-pill.desktop-ready {
            color:#93c5fd;
            border-color:rgba(147,197,253,.32);
            background:rgba(96,165,250,.10);
        }

        @media (max-height: 760px) {
            .sidebar { padding: 18px 0 14px; }
            .logo-ring { margin-bottom: 16px !important; }
            .nav-item {
                height: 42px;
                margin: 5px 0;
                border-radius: 15px;
            }
            .nav-fold-toggle {
                height: 32px;
                margin-bottom: 4px;
                border-radius: 14px;
            }
            .nav-fold-group { max-height: 282px; }
            .side-actions {
                margin-top:8px;
                margin-bottom:0;
                gap:5px;
                padding-top:8px;
                border-top:1px solid var(--border);
            }
            .side-pill {
                height:30px;
                width:40px;
            }
            .project-version-badge { width:40px; min-height:16px; font-size:8px; }
            .update-now-btn.show { min-height:22px; width:48px; }
        }

        @media (max-height: 660px) {
            .sidebar { padding: 12px 0; }
            .logo-ring {
                width:32px;
                height:32px;
                border-radius:10px;
                margin-bottom:10px !important;
            }
            .nav-item {
                height:38px;
                margin:3px 0;
                border-radius:14px;
            }
            .nav-fold-toggle { height:30px; }
            .nav-fold-group { max-height: 252px; }
            .side-actions {
                gap:4px;
                padding-top:6px;
            }
            .side-pill {
                height:30px;
                width:38px;
            }
            .side-pill svg { width:15px; height:15px; }
            .project-version-badge,
            .update-now-btn.show { display:none; }
        }

        .studio-modal[hidden] {
            display:none !important;
        }

        .studio-modal {
            position:fixed;
            inset:0;
            z-index:500;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
            background:rgba(15,23,42,.38);
            backdrop-filter:blur(10px);
        }

        .studio-modal-panel {
            width:min(560px, 100%);
            max-height:min(760px, calc(100vh - 48px));
            display:flex;
            flex-direction:column;
            overflow:hidden;
            border-radius:8px;
            border:1px solid rgba(15,23,42,.1);
            background:#fff;
            color:#111827;
            box-shadow:0 24px 70px rgba(15,23,42,.24);
        }

        .studio-modal-head {
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap:16px;
            padding:20px 20px 14px;
            border-bottom:1px solid #eef2f7;
        }

        .studio-modal-kicker {
            font-size:11px;
            font-weight:900;
            letter-spacing:.08em;
            color:#16a34a;
            text-transform:uppercase;
            margin-bottom:6px;
        }

        .studio-modal-title {
            font-size:20px;
            line-height:1.25;
            font-weight:900;
            margin:0;
            letter-spacing:0;
        }

        .studio-modal-close {
            width:32px;
            height:32px;
            border-radius:8px;
            border:1px solid #e5e7eb;
            background:#fff;
            color:#64748b;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            flex:0 0 auto;
        }

        .studio-modal-close:hover {
            color:#111827;
            border-color:#cbd5e1;
            background:#f8fafc;
        }

        .studio-modal-body {
            padding:18px 20px;
            overflow:auto;
        }

        .studio-modal-copy {
            margin:0 0 14px;
            color:#475569;
            font-size:13px;
            line-height:1.7;
        }

        .update-modal-summary {
            display:flex;
            align-items:flex-start;
            gap:10px;
            padding:12px;
            border:1px solid #e5e7eb;
            border-radius:8px;
            background:#f8fafc;
            color:#334155;
            font-size:12px;
            line-height:1.55;
        }

        .update-modal-summary strong {
            display:block;
            color:#111827;
            margin-bottom:2px;
            font-size:12px;
        }

        .update-modal-dot {
            width:9px;
            height:9px;
            margin-top:4px;
            border-radius:99px;
            background:#94a3b8;
            flex:0 0 auto;
        }

        .update-modal-summary.ok .update-modal-dot { background:#22c55e; }
        .update-modal-summary.warn .update-modal-dot { background:#f59e0b; }
        .update-modal-summary.fail .update-modal-dot { background:#ef4444; }

        .connectivity-list {
            display:grid;
            gap:8px;
            margin-top:14px;
        }

        .connectivity-row {
            display:grid;
            grid-template-columns:12px 1fr auto;
            align-items:center;
            gap:10px;
            min-height:42px;
            padding:9px 10px;
            border:1px solid #eef2f7;
            border-radius:8px;
            background:#fff;
        }

        .connectivity-indicator {
            width:9px;
            height:9px;
            border-radius:99px;
            background:#94a3b8;
        }

        .connectivity-row.ok .connectivity-indicator { background:#22c55e; }
        .connectivity-row.fail .connectivity-indicator { background:#ef4444; }
        .connectivity-row.pending .connectivity-indicator {
            background:#94a3b8;
            animation: studio-pulse 1s ease-in-out infinite;
        }

        .connectivity-name {
            font-size:12px;
            font-weight:900;
            color:#111827;
            line-height:1.25;
        }

        .connectivity-url {
            margin-top:3px;
            max-width:360px;
            overflow:hidden;
            text-overflow:ellipsis;
            white-space:nowrap;
            font-size:10px;
            color:#94a3b8;
        }

        .connectivity-status {
            justify-self:end;
            font-size:11px;
            font-weight:900;
            color:#64748b;
            white-space:nowrap;
        }

        .connectivity-error {
            grid-column:2 / 4;
            margin-top:-4px;
            color:#ef4444;
            font-size:11px;
            line-height:1.45;
            word-break:break-word;
        }

        .desktop-path-summary {
            display:grid;
            gap:8px;
            margin-bottom:14px;
            padding:12px;
            border:1px solid #e5e7eb;
            border-radius:8px;
            background:#f8fafc;
        }

        .desktop-path-key {
            color:#64748b;
            font-size:11px;
            font-weight:900;
            letter-spacing:.04em;
            text-transform:uppercase;
        }

        .desktop-path-value {
            display:block;
            max-width:100%;
            color:#0f172a;
            font-size:12px;
            line-height:1.55;
            word-break:break-all;
            white-space:normal;
            font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        .desktop-path-grid {
            display:grid;
            grid-template-columns:repeat(2, minmax(0, 1fr));
            gap:10px;
        }

        .desktop-path-card {
            min-height:74px;
            padding:12px;
            border-radius:8px;
            border:1px solid #e5e7eb;
            background:#fff;
            color:#0f172a;
            display:flex;
            align-items:flex-start;
            gap:10px;
            text-align:left;
            cursor:pointer;
        }

        .desktop-path-card:hover {
            border-color:#2563eb;
            background:#eff6ff;
        }

        .desktop-path-card[disabled] {
            opacity:.64;
            cursor:wait;
        }

        .desktop-path-card svg {
            width:18px;
            height:18px;
            margin-top:1px;
            flex:0 0 auto;
            color:#2563eb;
        }

        .desktop-path-card strong {
            display:block;
            margin-bottom:4px;
            color:inherit;
            font-size:13px;
            font-weight:900;
        }

        .desktop-path-card small {
            display:block;
            max-width:190px;
            color:#64748b;
            font-size:11px;
            line-height:1.4;
            overflow:hidden;
            text-overflow:ellipsis;
            white-space:nowrap;
        }

        .desktop-path-status {
            min-height:18px;
            margin-top:12px;
            color:#64748b;
            font-size:12px;
            line-height:1.5;
        }

        .studio-modal-actions {
            display:flex;
            justify-content:flex-end;
            gap:10px;
            padding:14px 20px 18px;
            border-top:1px solid #eef2f7;
            background:#fff;
        }

        .studio-modal-btn {
            min-height:36px;
            padding:0 14px;
            border-radius:8px;
            border:1px solid #e5e7eb;
            background:#fff;
            color:#334155;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:7px;
            font-size:12px;
            font-weight:900;
            cursor:pointer;
        }

        .studio-modal-btn svg {
            width:15px;
            height:15px;
            flex:0 0 auto;
        }

        .studio-modal-btn:hover {
            background:#f8fafc;
            border-color:#cbd5e1;
        }

        #connectivity-test-btn {
            border-color:rgba(37,99,235,.24);
            background:#eff6ff;
            color:#1d4ed8;
            transition:transform .16s ease, background-color .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;
        }

        #connectivity-test-btn:hover {
            transform:translateY(-1px);
            border-color:#2563eb;
            background:#2563eb;
            color:#fff;
            box-shadow:0 10px 22px rgba(37,99,235,.20);
        }

        #connectivity-test-btn:hover svg {
            transform:rotate(24deg);
        }

        #connectivity-test-btn:active {
            transform:translateY(0);
            box-shadow:0 5px 12px rgba(37,99,235,.16);
        }

        #connectivity-test-btn svg {
            transition:transform .18s ease;
        }

        .studio-modal-btn.primary {
            background:#111827;
            border-color:#111827;
            color:#fff;
        }

        .studio-modal-btn.primary:hover {
            background:#16a34a;
            border-color:#16a34a;
        }

        .studio-modal-btn[disabled] {
            opacity:.58;
            cursor:wait;
        }

        html.theme-dark .studio-modal,
        body.theme-dark .studio-modal {
            background:rgba(2,6,23,.56);
        }

        html.theme-dark .studio-modal-panel,
        body.theme-dark .studio-modal-panel,
        html.theme-dark .studio-modal-close,
        body.theme-dark .studio-modal-close,

        body.theme-dark .connectivity-row,
        html.theme-dark .desktop-path-card,
        body.theme-dark .desktop-path-card,
        html.theme-dark .studio-modal-actions,
        body.theme-dark .studio-modal-actions,
        html.theme-dark .studio-modal-btn,

            background:#111216;
            border-color:#25262b;
            color:#e8e8ea;
        }

        html.theme-dark .studio-modal-head,

        }

        html.theme-dark .studio-modal-copy,
        body.theme-dark .studio-modal-copy,
        html.theme-dark .connectivity-status,
        body.theme-dark .connectivity-status {
            color:#8f9aab;
        }

        html.theme-dark .update-modal-summary,
        body.theme-dark .update-modal-summary,
        html.theme-dark .desktop-path-summary,
        body.theme-dark .desktop-path-summary {
            background:#0c0d10;

            color:#9aa6b8;
        }

        html.theme-dark .update-modal-summary strong,
        body.theme-dark .update-modal-summary strong,
        html.theme-dark .connectivity-name,
        body.theme-dark .connectivity-name,
        html.theme-dark .desktop-path-value,
        body.theme-dark .desktop-path-value {
            color:#e8e8ea;
        }

        html.theme-dark .desktop-path-card:hover,
        body.theme-dark .desktop-path-card:hover {
            background:rgba(96,165,250,.12);
            border-color:#60a5fa;
        }

        html.theme-dark .studio-modal-btn.primary,
        body.theme-dark .studio-modal-btn.primary {
            background:#d8dee9;
            border-color:#d8dee9;
            color:#10141d;
        }

        html.theme-dark #connectivity-test-btn,
        body.theme-dark #connectivity-test-btn {
            background:rgba(96,165,250,.12);
            border-color:rgba(96,165,250,.34);
            color:#93c5fd;
        }

        html.theme-dark #connectivity-test-btn:hover,

            color:#07111f;

            border-color:#86efac;

        @media (max-width: 640px) {
            .studio-modal {
                align-items:flex-end;

            }

                max-height:calc(100vh - 24px);

            .studio-modal-actions {
                flex-wrap:wrap;
            }
            .studio-modal-btn {
                flex:1 1 130px;
            }
            .desktop-path-grid {
                grid-template-columns:1fr;
            }
        }

        }
        .sidebar.is-pinned .logo-ring {

        }

        /* Desktop polish */
        :root {
            --bg: #f4f6f8;
            --sidebar-bg: rgba(255,255,255,.92);
            --stage-bg: #ffffff;
            --border: rgba(15,23,42,.09);
            --stage-border: rgba(15,23,42,.12);
            --nav-hover-bg: #eef2f6;
            --monitor-bg: rgba(255,255,255,.88);
            --monitor-border: rgba(15,23,42,.10);
            --monitor-shadow: rgba(15,23,42,.10);
            --desktop-shadow: 0 20px 56px rgba(15,23,42,.10);
        }

        html.theme-dark,
        body.theme-dark {
            --bg: #101216;
            --sidebar-bg: rgba(16,18,22,.96);
            --stage-bg: #0d0f13;
            --border: rgba(255,255,255,.08);
            --stage-border: rgba(255,255,255,.10);
            --nav-hover-bg: #1a1e25;
            --monitor-bg: rgba(18,21,27,.88);
            --monitor-border: rgba(255,255,255,.10);
            --monitor-shadow: rgba(0,0,0,.34);
            --desktop-shadow: 0 22px 60px rgba(0,0,0,.38);
        }

        .app-shell {
            background:
                linear-gradient(135deg, rgba(255,255,255,.72), rgba(235,241,238,.78)),
                var(--bg);
        }

        html.theme-dark .app-shell,
        body.theme-dark .app-shell {
            background:
                linear-gradient(135deg, rgba(255,255,255,.035), rgba(93,124,112,.045)),
                var(--bg);
        }

        .sidebar {
            border-right: 1px solid var(--border);
            box-shadow: 10px 0 34px rgba(15,23,42,.045);
            backdrop-filter: blur(18px);
        }

        .logo-ring {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border-width: 1px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.42);
        }

        .nav-item,
        .nav-fold-toggle,
        .side-pill,
        .project-version-badge,
        .update-now-btn {
            border-radius: 10px;
            letter-spacing: 0;
        }

        .nav-item {
            height: 44px;
            margin: 6px 0;
        }

        .nav-item:hover,
        .nav-fold-toggle:hover,
        .side-pill:hover {
            box-shadow: inset 0 0 0 1px rgba(15,23,42,.05);
        }

        .nav-item.active {
            box-shadow: 0 10px 22px rgba(15,23,42,.16);
        }

        .nav-text,
        .side-pill-text,
        .label-nano,
        .studio-modal-kicker,
        .studio-modal-btn,
        .project-version-badge,
        .update-now-btn {
            letter-spacing: 0;
        }

        .stage {
            margin: 12px 12px 12px 0;
            border-radius: 18px;
            box-shadow: var(--desktop-shadow);
            background: var(--stage-bg);
        }

        iframe {
            background: var(--stage-bg);
        }

        .nano-monitor {
            bottom: 18px;
            left: 18px;
            border-radius: 10px;
            padding: 7px 12px;
            box-shadow: 0 12px 30px var(--monitor-shadow);
        }

        .studio-modal-panel {
            border-radius: 16px;
            box-shadow: 0 28px 80px rgba(15,23,42,.24);
        }

        @media (max-width: 760px) {
            .stage {
                margin: 8px 8px 8px 0;
                border-radius: 14px;
            }
            .nano-monitor {
                left: 12px;
                bottom: 12px;
            }
        }
    </style>
</head>

    <script>
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        const CID = localStorage.getItem("client_id") || generateUUID();
        localStorage.setItem("client_id", CID);
        const ACTIVE_PAGE_KEY = 'studio_active_page';
        const LOCAL_NAV_COLLAPSED_KEY = 'studio_local_nav_collapsed';
        const SIDEBAR_PINNED_KEY = 'studio_sidebar_pinned';
        const DEFAULT_PAGE_ID = 'zimage';
        const PAGE_IDS = ['zimage','enhance','klein','angle','online','gpt-chat','blindbox','canvas','history','asset-manager','api-settings','comfyui-settings'];
        const LOCAL_PAGE_IDS = ['zimage','enhance','klein','angle'];
        const PROJECT_URL = 'https://github.com/xc1500225328-max/Infinite-Canvas';
        const ORIGINAL_AUTHOR_URL = 'https://github.com/hero8152';
        let appInfo = {
            version:'',
            repo_url:PROJECT_URL,
            version_url:'https://raw.githubusercontent.com/xc1500225328-max/Infinite-Canvas/main/VERSION',
            tree_url:'https://api.github.com/repos/xc1500225328-max/Infinite-Canvas/git/trees/main?recursive=1',
            update_manifest_url:'https://github.com/xc1500225328-max/Infinite-Canvas/releases/latest/download/update.json',
            installer_update_supported:false
        };
        let updateConnectivityResult = null;
        let installerUpdateInfo = null;
        let projectUpdateRunning = false;
        const DESKTOP_LOCATION_ORDER = ['data', 'output', 'assets', 'workflows', 'logs', 'install'];
        const DESKTOP_LOCATION_META = {
            data: ['数据目录', 'Data folder'],
            output: ['输出图片', 'Output folder'],
            assets: ['素材目录', 'Assets folder'],
            workflows: ['用户工作流', 'User workflows'],
            logs: ['日志目录', 'Logs folder'],
            install: ['程序目录', 'Install folder'],
        };

        function setSidebarPinned(pinned, options = {}) {
            const sidebar = document.getElementById('studioSidebar');
            const logo = document.getElementById('sidebarLogoToggle');
            if(!sidebar) return;
            sidebar.classList.toggle('is-pinned', pinned);
            if(!pinned) {
                sidebar.classList.add('is-collapsing');
                window.setTimeout(() => sidebar.classList.remove('is-collapsing'), 360);
            } else {
                sidebar.classList.remove('is-collapsing');
            }
            if(logo) {
                logo.setAttribute('aria-pressed', pinned ? 'true' : 'false');
                logo.title = pinned ? '收起导航栏' : '固定导航栏';
            }
            if(!options.skipRemember) localStorage.setItem(SIDEBAR_PINNED_KEY, pinned ? '1' : '0');
        }

        function toggleSidebarPinned(event) {
            event?.preventDefault?.();
            event?.stopPropagation?.();
            const sidebar = document.getElementById('studioSidebar');
            setSidebarPinned(!sidebar?.classList.contains('is-pinned'));
        }

        function restoreSidebarPinned() {
            setSidebarPinned(localStorage.getItem(SIDEBAR_PINNED_KEY) === '1', { skipRemember:true });
        }

        function setLocalNavCollapsed(collapsed, options = {}) {
            const group = document.getElementById('local-nav-group');
            const toggle = document.getElementById('local-nav-toggle');
            if(group) group.classList.toggle('is-collapsed', collapsed);
            if(toggle) {
                toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
                toggle.title = collapsed ? '展开本地功能' : '折叠本地功能';
            }
            if(!options.skipRemember) localStorage.setItem(LOCAL_NAV_COLLAPSED_KEY, collapsed ? '1' : '0');
        }

        function toggleLocalNav() {
            const group = document.getElementById('local-nav-group');
            setLocalNavCollapsed(!group?.classList.contains('is-collapsed'));
        }

        function restoreLocalNav(id) {
            const savedCollapsed = localStorage.getItem(LOCAL_NAV_COLLAPSED_KEY) === '1';
            setLocalNavCollapsed(savedCollapsed && !LOCAL_PAGE_IDS.includes(id), { skipRemember:true });
        }

        function resetStudioRootScroll() {
            try {
                window.scrollTo(0, 0);
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
            } catch(e) {}
        }

        function switchUI(el, id, options = {}) {
            resetStudioRootScroll();
            if(!PAGE_IDS.includes(id)) id = DEFAULT_PAGE_ID;
            document.querySelectorAll('.nav-item,.side-pill').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            const target = document.getElementById('frame-' + id);
            target.classList.add('active');
            if (!target.src) target.src = target.dataset.src;
            if(!options.skipRemember) localStorage.setItem(ACTIVE_PAGE_KEY, id);
            // sync theme to newly activated iframe
            syncThemeToFrame(target);
            syncLanguageToFrame(target);
            if(LOCAL_PAGE_IDS.includes(id)) {
                setLocalNavCollapsed(false, { skipRemember:true });
            } else {
                setLocalNavCollapsed(localStorage.getItem(LOCAL_NAV_COLLAPSED_KEY) === '1', { skipRemember:true });
            }
            // 切换到画布时通知刷新工作流列表（防止在 comfyui-settings 修改后画布未及时更新）
            if (id === 'canvas' && target.src) {
                try { target.contentWindow?.postMessage({ type: 'canvas-focus' }, '*'); } catch(e) {}
            }
            const blindboxFrame = document.getElementById('frame-blindbox');
            if (blindboxFrame && blindboxFrame.contentWindow) {
                try {
                    blindboxFrame.contentWindow.postMessage({ type: 'blindbox-active', active: id === 'blindbox' }, '*');
                } catch(e) {}
            }
            resetStudioRootScroll();
        }

        function openCurrentPageInNewTab() {
            const activeFrame = document.querySelector('iframe.active');
            if (activeFrame && activeFrame.dataset.src) {
                const url = activeFrame.dataset.src;
                window.open(url, '_blank');
            } else {
                // 备用方案：使用 localStorage 中的当前页面
                const currentPageId = localStorage.getItem(ACTIVE_PAGE_KEY) || DEFAULT_PAGE_ID;
                const frame = document.getElementById('frame-' + currentPageId);
                if (frame && frame.dataset.src) {
                    window.open(frame.dataset.src, '_blank');
                }
            }
        }

        function repairNavFallbackText() {
            const historyText = document.querySelector('[data-i18n="nav.history"]');
            if(historyText && historyText.textContent.trim() === 'nav.history') historyText.textContent = '历史图片';
        }

        function forwardStudioApiChange(data) {
            if(!data || !['providers-changed','workflows-changed','comfy-instances-changed'].includes(data.type)) return;
            document.querySelectorAll('iframe').forEach(iframe => {
                try {
                    if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage(data, '*');
                } catch(e) {}
            });
        }

        window.addEventListener('message', event => {
            if (event.origin && event.origin !== location.origin) return;
            forwardStudioApiChange(event.data);
        });

        try {
            const studioApiChannel = new BroadcastChannel('studio-api');
            studioApiChannel.onmessage = event => forwardStudioApiChange(event.data);
        } catch(e) {}

        function restoreActivePage() {
            restoreSidebarPinned();
            const id = PAGE_IDS.includes(localStorage.getItem(ACTIVE_PAGE_KEY)) ? localStorage.getItem(ACTIVE_PAGE_KEY) : DEFAULT_PAGE_ID;
            restoreLocalNav(id);
            const trigger = document.querySelector(`[onclick*="'${id}'"],[onclick*='"${id}"']`);
            switchUI(trigger, id, { skipRemember:true });
            repairNavFallbackText();
            document.documentElement.classList.remove('studio-route-booting');
        }
        document.addEventListener('DOMContentLoaded', restoreActivePage, { once:true });

        async function syncStatus() {
            try {
                const res = await fetch(`/api/queue_status?client_id=${CID}`);
                const data = await res.json();
                const monitor = document.getElementById('nano-monitor');
                const queueVal = document.getElementById('queue-val');
                const logoDot = document.getElementById('logo-dot');
                const total = data.total || 0;
                const pos = data.position || 0;
                if (pos > 0) {
                    monitor.classList.add('is-busy');
                    queueVal.innerText = `${pos}/${total}`;
                    logoDot.style.backgroundColor = '#3b82f6';
                } else {
                    monitor.classList.remove('is-busy');
                    queueVal.innerText = total > 0 ? total : '0';
                    logoDot.style.backgroundColor = 'var(--text)';
                }
            } catch (e) { }
        }

        const host = window.location.host;
        if (host) {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${host}/ws/stats?client_id=${CID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'stats') {
                    document.getElementById('online-val').innerText = data.online_count;
                } else if (data.type === 'cloud_status') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                } else if (data.type === 'canvas_updated') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                } else if (data.type === 'asset_library_updated') {
                    document.querySelectorAll('iframe').forEach(iframe => {
                        if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage(data, '*');
                    });
                }
            };
            setInterval(syncStatus, 2000);
        }

        // --- 夜间模式 ---

        function syncThemeToFrame(iframe) {
            const theme = (window.StudioTheme || {get: () => 'light'}).get();
            try {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'studio-theme', theme }, '*');
                }
            } catch (e) {}
        }

        function broadcastTheme(theme) {
            if (window.StudioTheme) {
                window.StudioTheme.set(theme);
            }
            document.querySelectorAll('iframe').forEach(f => syncThemeToFrame(f));
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const moon = document.getElementById('icon-moon');
            const sun = document.getElementById('icon-sun');
            if (theme === 'dark') {
                moon.style.display = 'none';
                sun.style.display = 'block';
            } else {
                moon.style.display = 'block';
                sun.style.display = 'none';
            }
        }

        function toggleTheme() {
            const current = window.StudioTheme ? window.StudioTheme.get() : 'light';
            broadcastTheme(current === 'dark' ? 'light' : 'dark');
        }

        function toggleLanguage() {
            if(!window.StudioI18n) return;
            window.StudioI18n.toggle();
            document.querySelectorAll('iframe').forEach(frame => syncLanguageToFrame(frame));
            updateProjectUpdateTitle();

        function versionParts(value) {
            return String(value || '').match(/\d+/g)?.map(Number) || [];
        }

        function compareVersions(a, b) {
            const aa = versionParts(a);
            const bb = versionParts(b);
            const len = Math.max(aa.length, bb.length);
            for(let i = 0; i < len; i++){
                const diff = (aa[i] || 0) - (bb[i] || 0);
                if(diff) return diff;
            }
            return String(a || '').trim() === String(b || '').trim() ? 0 : 1;
        }

        function compactVersion(value) {
            const text = String(value || '').trim();
            const parts = text.match(/\d+/g) || [];
            if(parts.length >= 4) return `${parts[1]}.${parts[2]}.${parts[3]}`;
            if(parts.length >= 3) return `${parts[1]}.${parts[2]}`;
            return text.replace(/^v/i, '') || '-';
        }

        function versionLabel(value, mode = 'full') {
            const text = String(value || '').trim();
            if(!text) return 'v-';
            return mode === 'compact' ? `v${compactVersion(text)}` : `v${text.replace(/^v/i, '')}`;
        }

        async function runInstallerUpdateCheck(options = {}) {
            const testBtn = document.getElementById('connectivity-test-btn');
            const text = document.getElementById('connectivity-test-text');
            const keepDisabled = !!options.keepDisabled;
            if(testBtn) testBtn.disabled = true;
            if(text) text.textContent = updateUiText('检查中...', 'Checking...');
            setUpdateSummary(
                'warn',
                updateUiText('正在读取更新清单', 'Reading update manifest'),
                updateUiText('正在检查 update.json 和安装包信息。', 'Checking update.json and installer metadata.')
            );
            updateConnectivityResult = {
                ok:false,
                results:[
                    { name:'更新清单', url:appInfo.update_manifest_url || '', pending:true },
                    { name:'安装包', url:installerUpdateInfo?.setup_url || '', pending:true },
                ]
            };
            renderConnectivityList(updateConnectivityResult.results);
            try {
                const res = await fetch('/api/installer-update-info', { cache:'no-store' });
                const data = await res.json().catch(() => ({}));
                if(!res.ok) throw new Error(data.detail || updateUiText('读取更新清单失败', 'Failed to read update manifest'));
                installerUpdateInfo = data;
                updateConnectivityResult = {
                    ok:!!data.supported && !!data.available,
                    results:[
                        {
                            name:'更新清单',
                            url:data.manifest_url || appInfo.update_manifest_url || '',
                            ok:!!data.supported,
                            elapsed_ms:0,
                            error:data.supported ? '' : (data.reason || '')
                        },
                        {
                            name:'安装包',
                            url:data.setup_url || '',
                            ok:!!data.available,
                            elapsed_ms:0,
                            error:data.available ? '' : updateUiText('没有可用的新安装包', 'No newer installer available')
                        },
                    ]
                };
            } catch(e) {
                updateConnectivityResult = {
                    ok:false,
                    results:[
                        { name:'更新清单', url:appInfo.update_manifest_url || '', ok:false, elapsed_ms:0, error:String(e?.message || e) },
                        { name:'安装包', url:installerUpdateInfo?.setup_url || '', ok:false, elapsed_ms:0, error:String(e?.message || e) },
                    ]
                };
            } finally {
                if(testBtn && !keepDisabled) testBtn.disabled = false;
                refreshProjectUpdateModalText();
            }
            return updateConnectivityResult;
        }

        async function runInstallerPackageUpdate() {
            const isEn = window.StudioI18n?.lang?.() === 'en';
            const btn = document.getElementById('update-now-btn');
            const text = document.getElementById('update-now-text');
            const confirmBtn = document.getElementById('project-update-confirm-btn');
            const confirmText = document.getElementById('project-update-confirm-text');
            const testBtn = document.getElementById('connectivity-test-btn');
            const oldText = text?.textContent || '';
            if(projectUpdateRunning) return false;
            projectUpdateRunning = true;
            if(btn) btn.disabled = true;
            if(confirmBtn) confirmBtn.disabled = true;
            if(testBtn) testBtn.disabled = true;
            if(text) text.textContent = isEn ? 'Downloading...' : '下载中...';
            if(confirmText) confirmText.textContent = isEn ? 'Downloading...' : '下载中...';
            setUpdateSummary(
                'warn',
                isEn ? 'Downloading installer' : '正在下载安装包',
                isEn ? 'The installer is being downloaded and verified. Do not close the app.' : '正在下载安装包并校验 SHA256，请不要关闭程序。'
            );
            renderConnectivityList([
                { name:'更新清单', url:appInfo.update_manifest_url || '', ok:true, elapsed_ms:0 },
                { name:'安装包', url:installerUpdateInfo?.setup_url || '', pending:true },
            ]);
            try {
                const res = await fetch('/api/update-installer', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ silent:true, launch:true })
                });
                const data = await res.json().catch(() => ({}));
                if(!res.ok) throw new Error(data.detail || (isEn ? 'Installer update failed' : '安装包更新失败'));
                if(data.available === false) {
                    setUpdateSummary('ok', isEn ? 'Already up to date' : '已经是最新版本', isEn ? 'No newer installer is available.' : '没有可用的新安装包。');
                    return true;
                }
                setUpdateSummary(
                    'ok',
                    isEn ? 'Installer launched' : '安装器已启动',
                    isEn
                        ? 'The installer has been launched. Windows may ask for administrator permission; this app will close automatically.'
                        : '安装器已经启动。Windows 可能会请求管理员权限，当前程序会自动关闭。'
                );
                document.getElementById('github-entry-btn')?.classList.remove('update-available');
                btn?.classList.remove('show');
                return true;
            } catch(e) {
                setUpdateSummary('fail', isEn ? 'Installer update failed' : '安装包更新失败', describeNetworkError(e, isEn));
                return false;
            } finally {
                projectUpdateRunning = false;
                if(btn) btn.disabled = false;
                if(confirmBtn) confirmBtn.disabled = false;
                if(testBtn) testBtn.disabled = false;
                if(text) text.textContent = oldText || (isEn ? 'Update' : '一键更新');
                if(confirmText) confirmText.textContent = isEn ? 'Download installer' : '下载安装包';
                refreshUpdateButtonText();
            }
        }

        async function runProjectUpdate() {
            if(projectUpdateRunning) return;
            openProjectUpdateModal();
            if(currentProjectUpdateMode() === 'installer') {
                await runInstallerPackageUpdate();
                return;
            }
            const btn = document.getElementById('update-now-btn');
            const confirmBtn = document.getElementById('project-update-confirm-btn');
            const testBtn = document.getElementById('connectivity-test-btn');
            if(btn) btn.disabled = true;
            if(confirmBtn) confirmBtn.disabled = true;
            if(testBtn) testBtn.disabled = true;
            const result = await runUpdateConnectivityTest({ keepDisabled:true });
            if(!result?.ok || result.backend_missing) {
                if(btn) btn.disabled = false;
                if(confirmBtn) confirmBtn.disabled = false;
                if(testBtn) testBtn.disabled = false;
                refreshUpdateButtonText();
                return;
            }
            await confirmProjectUpdate({ skipConnectivityCheck:true });
        }

        async function runUpdateConnectivityTest(options = {}) {
            if(currentProjectUpdateMode() === 'installer') {
                return await runInstallerUpdateCheck(options);
            }
            const isEn = window.StudioI18n?.lang?.() === 'en';
            const btn = document.getElementById('connectivity-test-btn');
            const text = document.getElementById('connectivity-test-text');
            const keepDisabled = !!options.keepDisabled;
            if(btn) btn.disabled = true;
            if(text) text.textContent = isEn ? 'Testing...' : '检测中...';
            updateConnectivityResult = null;
            setUpdateSummary('warn', isEn ? 'Testing connectivity' : '正在测试连通性', isEn ? 'Checking GitHub update endpoints, GitHub home page, and Google.' : '正在检测 GitHub 更新节点、GitHub 主页和 Google。');
            renderConnectivityList(updateConnectivityTargets().map(item => ({...item, pending:true})));
            try {
                const res = await fetch('/api/update-connectivity', { cache:'no-store' });
                const data = await res.json().catch(() => ({}));
                if(res.status === 404) {
                    const message = isEn
                        ? 'The backend has not loaded the new connectivity-test API yet. Restart the backend service, then test again.'
                        : '后端还没有加载新的连通性测试接口。请重启服务后再测试。';
                    updateConnectivityResult = {
                        ok:false,
                        backend_missing:true,
                        results:updateConnectivityTargets().map(item => ({
                            ...item,
                            ok:false,
                            elapsed_ms:0,
                            error:message
                        }))
                    };
                } else {
                    if(!res.ok) throw new Error(data.detail || (isEn ? 'Connectivity test failed' : '连通性测试失败'));
                    updateConnectivityResult = data;
                }
            } catch(e) {
                updateConnectivityResult = {
                    ok:false,
                    results:updateConnectivityTargets().map(item => ({
                        ...item,
                        ok:false,
                        elapsed_ms:0,
                        error:describeNetworkError(e, isEn)
                    }))
                };
            } finally {
                if(btn && !keepDisabled) btn.disabled = false;
                refreshProjectUpdateModalText();
            }
            return updateConnectivityResult;
        }

        async function confirmProjectUpdate(options = {}) {
            if(currentProjectUpdateMode() === 'installer') {
                return await runInstallerPackageUpdate();
            }
            const isEn = window.StudioI18n?.lang?.() === 'en';
            const btn = document.getElementById('update-now-btn');
            const text = document.getElementById('update-now-text');
            const confirmBtn = document.getElementById('project-update-confirm-btn');
            const confirmText = document.getElementById('project-update-confirm-text');
            const testBtn = document.getElementById('connectivity-test-btn');
            const oldText = text?.textContent || '';
            if(projectUpdateRunning) return false;
            if(!options.skipConnectivityCheck && (!updateConnectivityResult || !updateConnectivityResult.ok || updateConnectivityResult.backend_missing)) {
                if(btn) btn.disabled = true;
                if(confirmBtn) confirmBtn.disabled = true;
                if(testBtn) testBtn.disabled = true;
                const result = await runUpdateConnectivityTest({ keepDisabled:true });
                if(!result?.ok || result.backend_missing) {
                    if(btn) btn.disabled = false;
                    if(confirmBtn) confirmBtn.disabled = false;
                    if(testBtn) testBtn.disabled = false;
                    refreshUpdateButtonText();
                    return false;
                }
            }
            projectUpdateRunning = true;
            if(btn) btn.disabled = true;
            if(confirmBtn) confirmBtn.disabled = true;
            if(testBtn) testBtn.disabled = true;
            if(text) text.textContent = isEn ? 'Updating...' : '更新中...';
            if(confirmText) confirmText.textContent = isEn ? 'Updating...' : '更新中...';
            setUpdateSummary('warn', isEn ? 'Updating' : '正在更新', isEn ? 'Downloading files from GitHub and creating a local backup.' : '正在从 GitHub 下载文件，并创建本地备份。');
            try {
                const res = await fetch('/api/update-from-github', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ auto_restart:true, restart_delay:3 })
                });
                const data = await res.json().catch(() => ({}));
                if(!res.ok) throw new Error(data.detail || (isEn ? 'Update failed' : '更新失败'));
                const restarting = data.restart_scheduled;
                setUpdateSummary(
                    'ok',
                    isEn ? 'Update complete' : '更新完成',
                    restarting
                        ? (isEn
                            ? `Updated ${data.count || 0} files. The backend will restart in about 3 seconds; this page will reload when it returns.`
                            : `已更新 ${data.count || 0} 个文件。后端将在约 3 秒后自动重启，本页面会在恢复后自动刷新。`)
                        : (isEn
                            ? `Updated ${data.count || 0} files. Please restart the backend, then refresh this page.`
                            : `已更新 ${data.count || 0} 个文件。请重启后端，然后刷新页面。`)
                );
                document.getElementById('github-entry-btn')?.classList.remove('update-available');
                btn?.classList.remove('show');
                setProjectVersionBadge(data.version || document.getElementById('github-entry-btn')?.dataset.remoteVersion || appInfo.version);
                if(restarting) waitForBackendAndReload();
                return true;
            } catch(e) {
                setUpdateSummary('fail', isEn ? 'Update failed' : '更新失败', describeNetworkError(e, isEn));
                return false;
            } finally {
                projectUpdateRunning = false;
                if(btn) btn.disabled = false;
                if(confirmBtn) confirmBtn.disabled = false;
                if(testBtn) testBtn.disabled = false;
                if(text) text.textContent = oldText || (isEn ? 'Update' : '一键更新');
                if(confirmText) confirmText.textContent = isEn ? 'Start update' : '开始更新';
                refreshUpdateButtonText();
            }
        }
        async function waitForBackendAndReload() {
            const deadline = Date.now() + 90 * 1000;
            await new Promise(r => setTimeout(r, 4000));
            while(Date.now() < deadline) {
                try {
                    const r = await fetch('/api/app-info', { cache:'no-store' });
                    if(r.ok) { location.reload(); return; }
                } catch {}
                await new Promise(r => setTimeout(r, 1500));
            }
        }
        async function rollbackProjectUpdate() {
            const isEn = window.StudioI18n?.lang?.() === 'en';
            try {
                const list = await fetch('/api/update-backups').then(r => r.json());
                const backups = list.backups || [];
                if(!backups.length){ alert(isEn ? 'No backups available.' : '没有可用的备份'); return; }
                const lines = backups.slice(0, 8).map((b, i) => {
                    const d = new Date((b.created_at || 0) * 1000);
                    const ts = d.toLocaleString();
                    return `${i + 1}. ${b.name}  (${b.file_count} files, ${ts})`;
                });
                const promptMsg = (isEn
                    ? 'Select a backup to restore (enter the number):\n'
                    : '选择要还原的备份（输入序号）：\n') + lines.join('\n');
                const answer = prompt(promptMsg, '1');
                const idx = Number(answer) - 1;
                if(!(idx >= 0 && idx < backups.length)) return;
                const target = backups[idx];
                if(!confirm(isEn ? `Restore "${target.name}"? Backend will restart.` : `要还原 "${target.name}" 吗？后端会自动重启。`)) return;
                const res = await fetch('/api/update-rollback', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ name:target.name, auto_restart:true, restart_delay:3 })
                });
                const data = await res.json().catch(() => ({}));
                if(!res.ok) throw new Error(data.detail || (isEn ? 'Rollback failed' : '回滚失败'));
                alert(isEn
                    ? `Restored ${data.count || 0} files. Backend is restarting.`
                    : `已还原 ${data.count || 0} 个文件。后端正在重启。`);
                if(data.restart_scheduled) waitForBackendAndReload();
            } catch(e) {
                alert((isEn ? 'Rollback failed: ' : '回滚失败：') + describeNetworkError(e, isEn));
            }
        }
        window.rollbackProjectUpdate = rollbackProjectUpdate;

        async function checkForUpdates() {
            try {
                const info = await fetch('/api/app-info', { cache:'no-store' }).then(r => r.json());
                appInfo = {...appInfo, ...info};
                const current = String(appInfo.version || '').trim();
                setProjectVersionBadge(current);
                if(appInfo.installer_update_supported) {
                    try {
                        const installerInfo = await fetch(`/api/installer-update-info?t=${Date.now()}`, { cache:'no-store' }).then(r => r.ok ? r.json() : null);
                        installerUpdateInfo = installerInfo || null;
                        if(installerInfo?.available && installerInfo.version) {
                            showUpdateNotice(current, String(installerInfo.version || '').trim(), 'installer');
                        }
                    } catch(e) {}
                    return;
                }
                let remote = '';
                try {
                    const remoteInfo = await fetch(`/api/update-version?t=${Date.now()}`, { cache:'no-store' }).then(r => r.ok ? r.json() : null);
                    remote = String(remoteInfo?.version || '').trim();
                } catch(e) {}
                if(!remote && appInfo.version_url) {
                    const remoteText = await fetch(`${appInfo.version_url}?t=${Date.now()}`, { cache:'no-store' }).then(r => r.ok ? r.text() : '');
                    remote = String(remoteText || '').trim().split(/\r?\n/)[0].trim();
                }
                if(current && remote && compareVersions(remote, current) > 0) showUpdateNotice(current, remote, 'source');
            } catch(e) {
                // 离线包里没有网络时保持安静，不影响本地使用。
            }
        }
    </script>
